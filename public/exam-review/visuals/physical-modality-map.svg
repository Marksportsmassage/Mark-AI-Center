<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">物理因子治療學圖像總整理</title>
  <desc id="desc">TENS、肌肉電刺激、脊椎牽引、震波的講義重點圖。</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#ffffff" stroke="#d8e2ec" stroke-width="2"/>
  <text x="90" y="110" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">物理因子：定義 → 機轉 → 參數 → 禁忌</text>
  <text x="90" y="155" font-size="22" font-family="Arial, sans-serif" fill="#475569">來源：TENS、肌肉電刺激、牽引、震波講義；HIFEM 缺檔</text>
  <g font-family="Arial, sans-serif" font-size="21" fill="#0f172a">
    <rect x="90" y="220" width="235" height="250" rx="20" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="125" y="270" font-weight="700">TENS</text>
    <text x="125" y="310">低頻：類嗎啡</text>
    <text x="125" y="345">高頻：門閥理論</text>
    <text x="125" y="380">Aβ / C fiber</text>
    <text x="125" y="415">模式與電極位置</text>
    <rect x="360" y="220" width="235" height="250" rx="20" fill="#dcfce7" stroke="#22c55e"/>
    <text x="395" y="270" font-weight="700">肌肉電刺激</text>
    <text x="395" y="310">20-1000 us</text>
    <text x="395" y="345">25-100 pps</text>
    <text x="395" y="380">MTIC 強度</text>
    <text x="395" y="415">1:3 - 1:5</text>
    <rect x="630" y="220" width="235" height="250" rx="20" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="665" y="270" font-weight="700">脊椎牽引</text>
    <text x="665" y="310">靜態 / 連續</text>
    <text x="665" y="345">持續 / 間歇</text>
    <text x="665" y="380">臨床運用</text>
    <text x="665" y="415">禁忌需背</text>
    <rect x="900" y="220" width="235" height="250" rx="20" fill="#fae8ff" stroke="#c084fc"/>
    <text x="935" y="270" font-weight="700">震波</text>
    <text x="935" y="310">10-100 MPa</text>
    <text x="935" y="345">電液/壓電/電磁</text>
    <text x="935" y="380">聚焦 / 放射</text>
    <text x="935" y="415">非連續機械波</text>
  </g>
  <rect x="420" y="535" width="360" height="70" rx="16" fill="#fee2e2" stroke="#ef4444"/>
  <text x="455" y="580" font-size="24" font-family="Arial, sans-serif" font-weight="700" fill="#991b1b">HIFEM：缺檔，不整理不編造</text>
</svg>

